[keymap]
preset = "default"

[keymap.overrides]

[language_servers.pylsp]
enabled = true
enable_pylint = false
enable_flake8 = false
enable_pydocstyle = false
enable_mypy = true
enable_pyflakes = false
enable_ruff = true

[save]
format_on_save = true
autosave = "after_delay"
autosave_delay = 1000

[snippets]
custom_paths = []
include_default_snippets = true

[formatting]
line_length = 79

[completion]
activate_on_typing = true
signature_hint_on_typing = false
copilot = true

[runtime]
on_cell_change = "autorun"
reactive_tests = true
watcher_on_save = "lazy"
default_csv_encoding = "utf-8"
default_sql_output = "auto"
auto_instantiate = true
std_stream_max_bytes = 1000000
output_max_bytes = 8000000
auto_reload = "off"
show_tracebacks = false

[diagnostics]
sql_linter = true

[package_management]
manager = "uv"

[server]
browser = "default"
follow_symlink = false

[ai.models]
displayed_models = []
custom_models = []

[ai.custom_providers]

[display]
reference_highlighting = true
default_table_page_size = 10
default_width = "medium"
default_table_max_columns = 50
code_editor_font_size = 16
theme = "light"
cell_output = "below"
dataframes = "rich"

[mcp]
presets = []

[mcp.mcpServers]
